<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chase</title>
<style>
  :root {
    --accent: #7c5cff;
    --text: #ffffff;
    --muted: rgba(255,255,255,0.65);
    --card-bg: rgba(15,15,20,0.55);
    --card-border: rgba(255,255,255,0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
    overflow-x: hidden;
    position: relative;

    /* CUSTOM BACKGROUND — swap this URL for your own image */
    background-image:
      linear-gradient(rgba(5,5,10,0.55), rgba(5,5,10,0.75)),
      url("https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=1400&q=80");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
  }

  canvas#particles {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .card {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 380px;
    background: var(--card-bg);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid var(--card-border);
    border-radius: 18px;
    padding: 32px 26px 26px;
    text-align: center;
    box-shadow: 0 0 40px rgba(124,92,255,0.15), 0 8px 32px rgba(0,0,0,0.4);
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .avatar-wrap {
    position: relative;
    width: 92px;
    height: 92px;
    margin: 0 auto 16px;
  }

  .avatar {
    width: 92px;
    height: 92px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #4636ff);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    font-weight: 700;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.08), 0 0 24px rgba(124,92,255,0.5);
  }

  .status-dot {
    position: absolute;
    bottom: 4px;
    right: 4px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #3ba55c;
    border: 3px solid #16151c;
  }

  h1 {
    font-size: 19px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .badge {
    font-size: 12px;
    color: var(--accent);
  }

  .typewriter {
    color: var(--muted);
    font-size: 13px;
    margin-top: 6px;
    height: 18px;
    font-family: 'Consolas', monospace;
  }

  .typewriter::after {
    content: '|';
    animation: blink 1s step-end infinite;
  }

  @keyframes blink { 50% { opacity: 0; } }

  .stats {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin: 18px 0 4px;
    font-size: 12px;
    color: var(--muted);
  }

  .stats span b { color: var(--text); }

  .divider {
    height: 1px;
    background: var(--card-border);
    margin: 20px 0 16px;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  a.link-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    padding: 12px 16px;
    text-decoration: none;
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s ease;
  }

  a.link-btn:hover {
    border-color: var(--accent);
    background: rgba(124,92,255,0.12);
    box-shadow: 0 0 16px rgba(124,92,255,0.3);
    transform: translateY(-1px);
  }

  a.link-btn .icon { font-size: 16px; width: 18px; text-align: center; }

  footer {
    margin-top: 22px;
    font-size: 11px;
    color: var(--muted);
  }

  /* Music player */
  .player {
    position: fixed;
    bottom: 18px;
    right: 18px;
    z-index: 5;
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(15,15,20,0.6);
    backdrop-filter: blur(14px);
    border: 1px solid var(--card-border);
    border-radius: 30px;
    padding: 8px 14px 8px 8px;
    cursor: pointer;
    transition: box-shadow 0.2s ease;
  }

  .player:hover { box-shadow: 0 0 18px rgba(124,92,255,0.35); }

  .play-icon {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
  }

  .bars {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 16px;
  }

  .bars span {
    width: 3px;
    background: var(--accent);
    border-radius: 2px;
    height: 4px;
    transition: height 0.15s ease;
  }

  .player.playing .bars span { animation: bar 0.8s ease-in-out infinite; }
  .bars span:nth-child(1) { animation-delay: 0s; }
  .bars span:nth-child(2) { animation-delay: 0.15s; }
  .bars span:nth-child(3) { animation-delay: 0.3s; }
  .bars span:nth-child(4) { animation-delay: 0.45s; }

  @keyframes bar {
    0%, 100% { height: 4px; }
    50% { height: 16px; }
  }
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="card">
  <div class="avatar-wrap">
    <div class="avatar">C</div>
    <div class="status-dot"></div>
  </div>

  <h1>chase <span class="badge">✔</span></h1>
  <div class="typewriter" id="typewriter"></div>

  <div class="stats">
    <span><b id="viewCount">—</b> views</span>
    <span><b>2026</b> joined</span>
  </div>

  <div class="divider"></div>

  <div class="links">
    <a class="link-btn" href="https://instagram.com/yourhandle" target="_blank">
      <span class="icon">📷</span> Instagram
    </a>
    <a class="link-btn" href="https://x.com/yourhandle" target="_blank">
      <span class="icon">✕</span> X / Twitter
    </a>
    <a class="link-btn" href="https://discord.gg/yourinvite" target="_blank">
      <span class="icon">🎮</span> Discord
    </a>
    <a class="link-btn" href="https://github.com/yourusername" target="_blank">
      <span class="icon">💻</span> GitHub
    </a>
    <a class="link-btn" href="https://yourportfolio.com" target="_blank">
      <span class="icon">🗂️</span> Portfolio
    </a>
  </div>

  <footer>chase.github.io</footer>
</div>

<div class="player" id="player">
  <div class="play-icon" id="playIcon">▶</div>
  <div class="bars"><span></span><span></span><span></span><span></span></div>
</div>

<audio id="bgAudio" loop>
  <source src="your-audio-file.mp3" type="audio/mpeg">
</audio>

<script>
  // Typewriter bio
  const phrases = ["building things", "playing r6 siege", "figuring it out"];
  const twEl = document.getElementById('typewriter');
  let pIndex = 0, cIndex = 0, deleting = false;

  function typeLoop() {
    const current = phrases[pIndex];
    if (!deleting) {
      cIndex++;
      twEl.textContent = current.slice(0, cIndex);
      if (cIndex === current.length) {
        deleting = true;
        setTimeout(typeLoop, 1200);
        return;
      }
    } else {
      cIndex--;
      twEl.textContent = current.slice(0, cIndex);
      if (cIndex === 0) {
        deleting = false;
        pIndex = (pIndex + 1) % phrases.length;
      }
    }
    setTimeout(typeLoop, deleting ? 40 : 70);
  }
  typeLoop();

  // Fake view counter (increments each visit, stored locally in the visitor's browser)
  const key = 'chase_biolink_views';
  let views = parseInt(localStorage.getItem(key) || '0', 10) + 1;
  localStorage.setItem(key, views);
  document.getElementById('viewCount').textContent = views.toLocaleString();

  // Audio player toggle
  const audio = document.getElementById('bgAudio');
  const player = document.getElementById('player');
  const playIcon = document.getElementById('playIcon');
  let playing = false;

  player.addEventListener('click', () => {
    if (playing) {
      audio.pause();
      playIcon.textContent = '▶';
      player.classList.remove('playing');
    } else {
      audio.play().catch(() => {});
      playIcon.textContent = '❚❚';
      player.classList.add('playing');
    }
    playing = !playing;
  });

  // Particle background
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let particles = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function initParticles() {
    particles = [];
    const count = Math.floor((canvas.width * canvas.height) / 18000);
    for (let i = 0; i < count; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.6 + 0.4,
        vy: Math.random() * 0.3 + 0.1,
        vx: (Math.random() - 0.5) * 0.2,
        alpha: Math.random() * 0.5 + 0.2
      });
    }
  }
  initParticles();

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const p of particles) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(124,92,255,${p.alpha})`;
      ctx.fill();
      p.y -= p.vy;
      p.x += p.vx;
      if (p.y < -10) { p.y = canvas.height + 10; p.x = Math.random() * canvas.width; }
    }
    requestAnimationFrame(animate);
  }
  animate();
</script>

</body>
</html>
